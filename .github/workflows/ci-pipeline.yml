# Triggering the pipeline
name: Retail Platform CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Scala-Tests:
    name: Run Unit Tests (ScalaTest)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compile and Execute Test Suites
        run: sbt test

  Docker-Build:
    name: Verify Container Compilation
    runs-on: ubuntu-22.04
    needs: Scala-Tests

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: retail-platform:latest