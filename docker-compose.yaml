services:
  postgres:
    image: postgres:13-alpine
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.7.1-python3.10
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - D:/projects/retail-platform/dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    user: "0:0"
    command: db init

  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__WEB_SERVER_HOST=0.0.0.0
      - AIRFLOW__WEBSERVER__SECRET_KEY=super_secret_consistent_key_12345
      - PYTHONPATH=/home/airflow/.local/lib/python3.10/site-packages
    volumes:
      - D:/projects/retail-platform/dags:/opt/airflow/dags
      - D:/projects/retail-platform/data:/app/data
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8085:8080"
    user: "0:0"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__SECRET_KEY=super_secret_consistent_key_12345
      - PYTHONPATH=/home/airflow/.local/lib/python3.10/site-packages
    volumes:
      - D:/projects/retail-platform/dags:/opt/airflow/dags
      - D:/projects/retail-platform/data:/app/data
      - ./logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    user: "0:0"
    command: scheduler